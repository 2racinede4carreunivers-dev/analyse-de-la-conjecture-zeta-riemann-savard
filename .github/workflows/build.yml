name: Build Isabelle + LaTeX + Release intelligente

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install minimal TeX Live + pygments + français
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          texlive-latex-base \
          texlive-latex-recommended \
          texlive-latex-extra \
          texlive-fonts-recommended \
          texlive-lang-french \
          python3-pygments

    - name: Install Isabelle 2024
      run: |
        wget https://isabelle.in.tum.de/website-Isabelle2024/dist/Isabelle2024_linux.tar.gz
        tar -xzf Isabelle2024_linux.tar.gz
        mv Isabelle2024 isabelle
        echo "$PWD/isabelle/bin" >> $GITHUB_PATH

    - name: Isabelle build (certification HOL)
      run: |
        set -e
        if [ -f ROOT ]; then
          isabelle build -D .
        else
          shopt -s nullglob
          for thy in methode_spectral.thy methode_de_philippot.thy mecanique_discret.thy postulat_carre.thy; do
            if [ -f "$thy" ]; then
              echo "Building Isabelle theory: $thy"
              isabelle build -b -d . "$thy"
            fi
          done
        fi

    - name: Compile LaTeX (minted + TOC) et déplacer les PDF
      run: |
        set -e
        mkdir -p build
        for file in \
          geometrie_du_spectre_premier.tex \
          prime_spectrum_geometry.tex \
          pilosophy_geometry_of_prime_number.tex \
          telosemantique_analogiste_spectre_premier.tex \
          mecanique_chaos_discret.tex \
          postulat_univers_carre.tex; do
          if [ -f "$file" ]; then
            echo "Compiling $file"
            pdflatex -shell-escape -interaction=nonstopmode "$file"
            pdflatex -shell-escape -interaction=nonstopmode "$file"
            pdflatex -shell-escape -interaction=nonstopmode "$file"
            pdf="${file%.tex}.pdf"
            if [ -f "$pdf" ]; then
              mv "$pdf" build/
            fi
          fi
        done

    - name: Generate attestation report (SHA-256 des PDF)
      run: |
        cd build
        if ls *.pdf >/dev/null 2>&1; then
          sha256sum *.pdf > ../attestation_report.txt
        else
          echo "Aucun PDF généré." > ../attestation_report.txt
        fi

    - name: Generate build metadata
      run: |
        echo "Build provenance" > build_metadata.txt
        echo "Commit SHA : $(git rev-parse HEAD)" >> build_metadata.txt
        echo "Branche : $(git rev-parse --abbrev-ref HEAD)" >> build_metadata.txt
        echo "Date : $(date -u)" >> build_metadata.txt
        echo "" >> build_metadata.txt
        echo "PDF générés :" >> build_metadata.txt
        ls build/*.pdf >> build_metadata.txt 2>/dev/null || echo "Aucun PDF" >> build_metadata.txt
        echo "" >> build_metadata.txt
        echo "SHA-256 des PDF :" >> build_metadata.txt
        sha256sum build/*.pdf >> build_metadata.txt 2>/dev/null || echo "Aucun hash" >> build_metadata.txt

    - name: Upload PDF artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pdf-documents
        path: build/*.pdf

    - name: Upload attestation report
      uses: actions/upload-artifact@v4
      with:
        name: attestation-report
        path: attestation_report.txt

    - name: Upload build metadata
      uses: actions/upload-artifact@v4
      with:
        name: build-metadata
        path: build_metadata.txt

    - name: Generate build provenance (SLSA v1 pour .tex, .thy, .pdf)
      uses: actions/attest-build-provenance@v1
      with:
        subject-path: |
          geometrie_du_spectre_premier.tex
          prime_spectrum_geometry.tex
          pilosophy_geometry_of_prime_number.tex
          telosemantique_analogiste_spectre_premier.tex
          mecanique_chaos_discret.tex
          postulat_univers_carre.tex
          methode_spectral.thy
          methode_de_philippot.thy
          mecanique_discret.thy
          postulat_carre.thy
          build/geometrie_du_spectre_premier.pdf
          build/prime_spectrum_geometry.pdf
          build/pilosophy_geometry_of_prime_number.pdf
          build/telosemantique_analogiste_spectre_premier.pdf
          build/mecanique_chaos_discret.pdf
          build/postulat_univers_carre.pdf

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download attestation report
      uses: actions/download-artifact@v4
      with:
        name: attestation-report
        path: .

    - name: Download build metadata
      uses: actions/download-artifact@v4
      with:
        name: build-metadata
        path: .
