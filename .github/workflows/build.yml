name: Build LaTeX + Isabelle

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # --- INSTALLATION TECTONIC (LaTeX minimal) ---
    - name: Install Tectonic
      run: |
        sudo apt-get update
        sudo apt-get install -y tectonic

    # --- INSTALLATION ISABELLE 2026 ---
    - name: Install Isabelle 2026
      run: |
        wget https://isabelle.in.tum.de/website-Isabelle2026/dist/Isabelle2026_linux.tar.gz
        tar -xzf Isabelle2026_linux.tar.gz
        mv Isabelle2026 $HOME/isabelle
        echo "$HOME/isabelle/bin" >> $GITHUB_PATH

    # --- COMPILATION DES FICHIERS LATEX ---
    - name: Compile LaTeX files
      run: |
        tectonic geometrie_du_spectre_premier.tex
        tectonic geometry_prime_spectrum.tex
        tectonic philosophy_geometry_prime_numbrer.tex
        tectonic postulat_univers_carre.tex
        tectonic teleosemantique_analogiste_spectre_premier.tex
        tectonic mecanique_chaos_discret.tex

    # --- COMPILATION DES FICHIERS ISABELLE ---
    - name: Build Isabelle theories
      run: |
        isabelle build -D . -v

    # --- ARTEFACTS ---
    - name: Upload PDFs
      uses: actions/upload-artifact@v4
      with:
        name: pdfs
        path: |
          *.pdf

    - name: Upload Isabelle logs
      uses: actions/upload-artifact@v4
      with:
        name: isabelle-logs
        path: $HOME/.isabelle/Isabelle2026/log