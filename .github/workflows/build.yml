name: Build Isabelle + LaTeX + Release automatique

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install minimal TeX Live + pygments
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          texlive-latex-base \
          texlive-latex-recommended \
          texlive-latex-extra \
          texlive-fonts-recommended \
          python3-pygments

    - name: Install Isabelle 2024
      run: |
        wget https://isabelle.in.tum.de/website-Isabelle2024/dist/Isabelle2024_linux.tar.gz
        tar -xzf Isabelle2024_linux.tar.gz
        mv Isabelle2024 isabelle
        echo "$PWD/isabelle/bin" >> $GITHUB_PATH

    - name: Isabelle build (certification HOL)
      run: |
        if [ -f ROOT ]; then
          isabelle build -D .
        else
          shopt -s nullglob
          for thy in *.thy; do
            isabelle build -b -d . "$thy" || true
          done
        fi

    - name: Compile LaTeX (minted + sml + TOC)
      run: |
        shopt -s nullglob
        for file in *.tex; do
          pdflatex -shell-escape -interaction=nonstopmode "$file" || true
          pdflatex -shell-escape -interaction=nonstopmode "$file" || true
          pdflatex -shell-escape -interaction=nonstopmode "$file" || true
        done

    - name: Generate attestation report (SHA-256 des PDF)
      run: |
        shopt -s nullglob
        if ls *.pdf >/dev/null 2>&1; then
          sha256sum *.pdf > attestation_report.txt
        else
          echo "Aucun PDF généré." > attestation_report.txt
        fi

    - name: Upload PDFs
      uses: actions/upload-artifact@v4
      with:
        name: pdfs
        path: "*.pdf"

    - name: Upload attestation report
      uses: actions/upload-artifact@v4
      with:
        name: attestation-report
        path: attestation_report.txt

    - name: Generate build provenance
      uses: actions/attest-build-provenance@v1
      with:
        subject-path: "*.pdf"

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download PDFs
      uses: actions/download-artifact@v4
      with:
        name: pdfs
        path: .

    - name: Download attestation report
      uses: actions/download-artifact@v4
      with:
        name: attestation-report
        path: .

    - name: Lire le tag calculé par note.sh
      id: read_tag
      run: |
        if [ ! -f .next_tag ]; then
          echo "ERREUR : le fichier .next_tag est manquant."
          echo "Assure-toi d'avoir exécuté ./note.sh avant le commit."
          exit 1
        fi
        TAG=$(cat .next_tag)
        echo "Tag détecté : $TAG"
        echo "tag=$TAG" >> $GITHUB_OUTPUT

    # 🔥 Correction : suppression de la vérification bloquante du tag existant
    # (Tu voulais que le workflow ne se questionne plus sur le tag)

    - name: Generate filtered repository structure
      id: structure
      run: |
        echo "tree<<EOF" >> $GITHUB_OUTPUT
        find . -type f \( \
          -name "*.tex" -o \
          -name "*.thy" -o \
          -name "*.pdf" -o \
          -name "README*.md" -o \
          -name "CHANGELOG.md" -o \
          -name "SECURITY.md" -o \
          -name "algorithme_methodologie.md" -o \
          -name "guide_*.md" \
        \) | sed 's|^\./||' | sort | awk '
          BEGIN{FS="/" }
          {
            indent = ""
            for(i=1;i<NF;i++) indent = indent "  "
            print indent "├── " $NF
          }
        ' >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Analyse post-mortem (Niveau 1 humain/documentaire)
      id: postmortem
      run: |
        if [ -x scripts/postmortem.sh ]; then
          bash scripts/postmortem.sh > postmortem.txt
        else
          echo "Post-mortem non disponible (scripts/postmortem.sh manquant ou non exécutable)." > postmortem.txt
        fi
        echo "text<<EOF" >> $GITHUB_OUTPUT
        cat postmortem.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Analyse des changements (Niveau 1 & 2)
      id: analysis
      run: |
        if [ -x scripts/analyse_changes.sh ]; then
          bash scripts/analyse_changes.sh > analysis.txt
        else
          echo "Aucune analyse automatique détaillée n'a été générée (scripts/analyse_changes.sh manquant ou non exécutable)." > analysis.txt
        fi
        echo "text<<EOF" >> $GITHUB_OUTPUT
        cat analysis.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Carte téléosémantique (Niveau 3)
      id: teleo
      run: |
        if [ -x scripts/teleosemantic_map.sh ]; then
          bash scripts/teleosemantic_map.sh > teleo.txt
        else
          echo "La théorie se trouve dans un état téléosémantique stable : la structure évolue progressivement, en cohérence avec les versions précédentes." > teleo.txt
        fi
        echo "text<<EOF" >> $GITHUB_OUTPUT
        cat teleo.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Extraire le message du commit
      id: commit_msg
      run: |
        msg=$(git log -1 --pretty=%B | tr '\n' ' ' | sed 's/"/“/g')
        echo "message=$msg" >> $GITHUB_OUTPUT

    # 🔥 BLOC CORRIGÉ : remplacement automatique des PDF sans se soucier du tag
    - name: Create or Update Release
      id: rel
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ steps.read_tag.outputs.tag }}
        name: "Release intelligente — Projet ACR"
        allowUpdates: true
        removeArtifacts: true
        replacesArtifacts: true
        artifacts: |
          *.pdf
          *.tex
          *.thy
          attestation_report.txt
        artifactErrorsFailBuild: false
        body: |
          # Release intelligente — Projet ACR

          ## 1. Post-mortem de la version précédente
          ${{ steps.postmortem.outputs.text }}

          ## 2. Nouveaux points apportés
          ${{ steps.analysis.outputs.text }}

          ## 3. Classification conceptuelle
          - Niveau 1 : documentaire
          - Niveau 2 : formel
          - Niveau 3 : téléosémantique

          ## 4. Carte téléosémantique
          ${{ steps.teleo.outputs.text }}

          ## 5. Compilation et certification
          - PDF recompilés
          - Certification Isabelle/HOL
          - Rapport SHA-256 généré

          ## 6. Artefacts inclus
          - PDF
          - TEX
          - THY
          - Attestation cryptographique

          ## 7. Structure du dépôt
          ```
          ${{ steps.structure.outputs.tree }}
          ```

          ## 8. Message du commit
          ${{ steps.commit_msg.outputs.message }}

    - name: Release summary
      run: |
        echo "## Release mise à jour" >> $GITHUB_STEP_SUMMARY
        echo "- Tag : ${{ steps.read_tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
        echo "- Lien : ${{ steps.rel.outputs.html_url }}" >> $GITHUB_STEP_SUMMARY
