name: Build LaTeX + Isabelle

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # --- INSTALLATION TECTONIC (méthode binaire officielle) ---
    - name: Install Tectonic
      run: |
        wget https://github.com/tectonic-typesetting/tectonic/releases/latest/download/tectonic-x86_64-unknown-linux-gnu.tar.gz
        tar -xzf tectonic-x86_64-unknown-linux-gnu.tar.gz
        sudo mv tectonic /usr/local/bin/

    # --- INSTALLATION ISABELLE 2025 ---
    - name: Install Isabelle 2025
      run: |
        wget https://isabelle.in.tum.de/website-Isabelle2025/dist/Isabelle2025_linux.tar.gz
        tar -xzf Isabelle2025_linux.tar.gz
        mv Isabelle2025 $HOME/isabelle
        echo "$HOME/isabelle/bin" >> $GITHUB_PATH

    # --- COMPILATION DES FICHIERS LATEX ---
    - name: Compile LaTeX files
      run: |
        tectonic geometrie_du_spectre_premier.tex --keep-intermediates --shell-escape
        tectonic geometry_prime_spectrum.tex --keep-intermediates --shell-escape
        tectonic philosophy_geometry_prime_numbrer.tex --keep-intermediates --shell-escape
        tectonic postulat_univers_carre.tex --keep-intermediates --shell-escape
        tectonic teleosemantique_analogiste_spectre_premier.tex --keep-intermediates --shell-escape
        tectonic mecanique_chaos_discret.tex --keep-intermediates --shell-escape

    # --- COMPILATION DES FICHIERS ISABELLE ---
    - name: Build Isabelle theories
      run: |
        isabelle build -D . -v

    # --- ARTEFACTS ---
    - name: Upload PDFs
      uses: actions/upload-artifact@v4
      with:
        name: pdfs
        path: |
          *.pdf

    - name: Upload Isabelle logs
      uses: actions/upload-artifact@v4
      with:
        name: isabelle-logs
        path: $HOME/.isabelle/Isabelle2025/log