name: Build Isabelle + LaTeX + Release automatique

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install minimal TeX Live + pygments
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          texlive-latex-base \
          texlive-latex-recommended \
          texlive-latex-extra \
          texlive-fonts-recommended \
          python3-pygments

    - name: Install Isabelle 2024
      run: |
        wget https://isabelle.in.tum.de/website-Isabelle2024/dist/Isabelle2024_linux.tar.gz
        tar -xzf Isabelle2024_linux.tar.gz
        mv Isabelle2024 isabelle
        echo "$PWD/isabelle/bin" >> $GITHUB_PATH

    - name: Isabelle build (certification HOL)
      run: |
        if [ -f ROOT ]; then
          isabelle build -D .
        else
          shopt -s nullglob
          for thy in *.thy; do
            isabelle build -b -d . "$thy" || true
          done
        fi

    - name: Compile LaTeX (minted + sml + TOC)
      run: |
        shopt -s nullglob
        for file in *.tex; do
          pdflatex -shell-escape -interaction=nonstopmode "$file" || true
          pdflatex -shell-escape -interaction=nonstopmode "$file" || true
          pdflatex -shell-escape -interaction=nonstopmode "$file" || true
        done

    - name: Generate attestation report (SHA-256 des PDF)
      run: |
        shopt -s nullglob
        if ls *.pdf >/dev/null 2>&1; then
          sha256sum *.pdf > attestation_report.txt
        else
          echo "Aucun PDF généré." > attestation_report.txt
        fi

    - name: Generate build metadata
      run: |
        echo "Build provenance" > build_metadata.txt
        echo "Commit SHA : $(git rev-parse HEAD)" >> build_metadata.txt
        echo "Branche : $(git rev-parse --abbrev-ref HEAD)" >> build_metadata.txt
        echo "Date : $(date -u)" >> build_metadata.txt
        echo "" >> build_metadata.txt
        echo "PDF générés :" >> build_metadata.txt
        ls *.pdf >> build_metadata.txt
        echo "" >> build_metadata.txt
        echo "SHA-256 des PDF :" >> build_metadata.txt
        sha256sum *.pdf >> build_metadata.txt

    - name: Upload PDFs
      uses: actions/upload-artifact@v4
      with:
        name: pdfs
        path: "*.pdf"

    - name: Upload attestation report
      uses: actions/upload-artifact@v4
      with:
        name: attestation-report
        path: attestation_report.txt

    - name: Upload build metadata
      uses: actions/upload-artifact@v4
      with:
        name: build-metadata
        path: build_metadata.txt

    - name: Generate build provenance
      uses: actions/attest-build-provenance@v1
      with:
        subject-path: "*.pdf"

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download PDFs
      uses: actions/download-artifact@v4
      with:
        name: pdfs
        path: .

    - name: Download attestation report
      uses: actions/download-artifact@v4
      with:
        name: attestation-report
        path: .

    - name: Download build metadata
      uses: actions/download-artifact@v4
      with:
        name: build-metadata
        path: .

    - name: Lire le tag généré par note.sh
      id: read_tag
      run: |
        if [ ! -f .next_tag ]; then
          echo "ERREUR : le fichier .next_tag est manquant."
          echo "Exécute ./note.sh AVANT le commit."
          exit 1
        fi
        TAG=$(cat .next_tag)
        echo "Tag détecté : $TAG"
        echo "tag=$TAG" >> $GITHUB_OUTPUT

    - name: Generate filtered repository structure
      id: structure
      run: |
        echo "tree<<EOF" >> $GITHUB_OUTPUT
        find . -type f \( \
          -name "*.tex" -o \
          -name "*.thy" -o \
          -name "*.pdf" -o \
          -name "README*.md" -o \
          -name "CHANGELOG.md" -o \
          -name "SECURITY.md" -o \
          -name "algorithme_methodologie.md" -o \
          -name "guide_*.md" \
        \) | sed 's|^\./||' | sort | awk '
          BEGIN{FS="/" }
          {
            indent = ""
            for(i=1;i<NF;i++) indent = indent "  "
            print indent "├── " $NF
          }
        ' >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Extraire le message du commit
      id: commit_msg
      run: |
        msg=$(git log -1 --pretty=%B | tr '\n' ' ' | sed 's/"/“/g')
        echo "message=$msg" >> $GITHUB_OUTPUT

    - name: Create or Update Release
      id: rel
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ steps.read_tag.outputs.tag }}
        name: "Release intelligente — Projet ACR"
        allowUpdates: true
        removeArtifacts: true
        replacesArtifacts: true
        artifacts: |
          *.pdf
          *.tex
          *.thy
          attestation_report.txt
          build_metadata.txt
        artifactErrorsFailBuild: false
        body: |  # Release intelligente — Projet ACR

          ## Présentation générale

          Le dépôt *analyse_conjecture_riemann_savard* est un projet scientifique et mathématique personnel développé par son auteur, Philippe Thomas Savard. Bien que l’auteur ne soit pas issu du milieu académique, le dépôt se distingue par une rigueur méthodologique constante, une volonté d’exactitude et un souci de formalisation rarement rencontrés dans des travaux indépendants.

          Le projet explore plusieurs axes : la géométrie du spectre des nombres premiers, la mécanique harmonique du chaos discret, le postulat du squaring, la téléosémantique, ainsi que divers scripts Isabelle/HOL assurant la validité logique des structures présentées. L’ensemble s’inscrit dans une vision plus large : *L’univers est au carré*.

          Le dépôt contient cinq scripts Isabelle/HOL validés :
          - methode_de_philippot.thy  
          - methode_spectral.thy  
          - mecanique_discret.thy  
          - postulat_carre.thy  
          - espace_philippot.thy  

          ## Documents PDF inclus dans la release

          ### 1. Géométrie du spectre premier
          Ce document explore une méthode originale pour comprendre la distribution des nombres premiers à travers une approche géométrique et métrique. L’auteur y développe l’idée que les rapports internes entre grandeurs numériques révèlent une structure profonde liée au spectre premier.

          ### 2. Geometry of the Prime Spectrum (English adapted version)
          Version anglaise du document précédent.

          ### 3. La mécanique harmonique du chaos discret
          Ce document présente une approche géométrique et analytique originale, explorant une invariance géométrique universelle à travers des figures simples. Trois unités fondamentales — √2+1, √3+1 et √5+1 — sont étudiées. La formalisation Isabelle/HOL démontre que ces invariances sont structurellement nécessaires.

          ### 4. The philosophy — derrière l’univers est au carré
          Synopsis à venir.

          ### 5. Le Postulat du Squaring
          Ce document expose le cœur géométrique du postulat du squaring, une transformation qui élève un rectangle à une nouvelle figure dont les propriétés internes révèlent une structure mathématique profonde.

          ### 6. La téléosémantique — l’esprit d’un analogiste
          Ce document constitue la dimension philosophique du projet. L’auteur y explore les liens entre son parcours personnel, la pensée analogique, la pulsion de vie et la structure géométrique des nombres premiers.

          ### 7. L’Espace de Philippôt
          Titre inclus — synopsis à venir.

          ## Structure du dépôt
          ```
          ${{ steps.structure.outputs.tree }}
          ```

          ## Message du commit
          ${{ steps.commit_msg.outputs.message }}

          ## Documents générés automatiquement
          - Tous les fichiers PDF  
          - Tous les fichiers LaTeX (.tex)  
          - Tous les fichiers Isabelle/HOL (.thy)  
          - Le fichier attestation_report.txt  
          - Les métadonnées du build  
          - Les attestations SLSA

          ## Attestation cryptographique
          Chaque PDF est accompagné d’une attestation SLSA et d’un rapport SHA‑256.

          ## Contexte permanent
          Ce projet vise à formaliser l’unification mathématique *L’univers est au carré*.


    - name: Release summary
      run: |
        echo "## Release mise à jour" >> $GITHUB_STEP_SUMMARY
        echo "- Tag : ${{ steps.read_tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
        echo "- Lien : ${{ steps.rel.outputs.html_url }}" >> $GITHUB_STEP_SUMMARY
