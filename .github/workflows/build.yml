name: Build Isabelle + LaTeX + Release automatique

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install minimal TeX Live + pygments
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          texlive-latex-base \
          texlive-latex-recommended \
          texlive-latex-extra \
          texlive-fonts-recommended \
          python3-pygments

    - name: Install Isabelle 2024
      run: |
        wget https://isabelle.in.tum.de/website-Isabelle2024/dist/Isabelle2024_linux.tar.gz
        tar -xzf Isabelle2024_linux.tar.gz
        mv Isabelle2024 isabelle
        echo "$PWD/isabelle/bin" >> $GITHUB_PATH

    - name: Isabelle build (certification HOL)
      run: |
        if [ -f ROOT ]; then
          isabelle build -D .
        else
          shopt -s nullglob
          for thy in *.thy; do
            isabelle build -b -d . "$thy" || true
          done
        fi

    - name: Compile LaTeX (minted + sml + TOC)
      run: |
        shopt -s nullglob
        for file in *.tex; do
          pdflatex -shell-escape -interaction=nonstopmode "$file" || true
          pdflatex -shell-escape -interaction=nonstopmode "$file" || true
          pdflatex -shell-escape -interaction=nonstopmode "$file" || true
        done

    - name: Generate attestation report (SHA-256 des PDF)
      run: |
        shopt -s nullglob
        if ls *.pdf >/dev/null 2>&1; then
          sha256sum *.pdf > attestation_report.txt
        else
          echo "Aucun PDF généré." > attestation_report.txt
        fi

    - name: Upload PDFs
      uses: actions/upload-artifact@v4
      with:
        name: pdfs
        path: "*.pdf"

    - name: Upload attestation report
      uses: actions/upload-artifact@v4
      with:
        name: attestation-report
        path: attestation_report.txt

    - name: Generate build provenance
      uses: actions/attest-build-provenance@v1
      with:
        subject-path: "*.pdf"

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download PDFs
      uses: actions/download-artifact@v4
      with:
        name: pdfs
        path: .

    - name: Download attestation report
      uses: actions/download-artifact@v4
      with:
        name: attestation-report
        path: .

    - name: Lire le tag calculé par note.sh
      id: read_tag
      run: |
        if [ ! -f .next_tag ]; then
          echo "ERREUR : le fichier .next_tag est manquant."
          echo "Assure-toi d'avoir exécuté ./note.sh avant le commit."
          exit 1
        fi
        TAG=$(cat .next_tag)
        echo "Tag détecté : $TAG"
        echo "tag=$TAG" >> $GITHUB_OUTPUT

    - name: Vérifier que le tag n'existe pas déjà
      run: |
        TAG="${{ steps.read_tag.outputs.tag }}"
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "ERREUR : le tag $TAG existe déjà. Le versionnement doit produire un tag nouveau."
          exit 1
        fi

    - name: Generate filtered repository structure
      id: structure
      run: |
        echo "tree<<EOF" >> $GITHUB_OUTPUT
        find . -type f \( \
          -name "*.tex" -o \
          -name "*.thy" -o \
          -name "*.pdf" -o \
          -name "README*.md" -o \
          -name "CHANGELOG.md" -o \
          -name "SECURITY.md" -o \
          -name "algorithme_methodologie.md" -o \
          -name "guide_*.md" \
        \) | sed 's|^\./||' | sort | awk '
          BEGIN{FS="/" }
          {
            indent = ""
            for(i=1;i<NF;i++) indent = indent "  "
            print indent "├── " $NF
          }
        ' >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Analyse post-mortem (Niveau 1 humain/documentaire)
      id: postmortem
      run: |
        if [ -x scripts/postmortem.sh ]; then
          bash scripts/postmortem.sh > postmortem.txt
        else
          echo "Post-mortem non disponible (scripts/postmortem.sh manquant ou non exécutable)." > postmortem.txt
        fi
        echo "text<<EOF" >> $GITHUB_OUTPUT
        cat postmortem.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Analyse des changements (Niveau 1 & 2)
      id: analysis
      run: |
        if [ -x scripts/analyse_changes.sh ]; then
          bash scripts/analyse_changes.sh > analysis.txt
                else
          echo "Aucune analyse automatique détaillée n'a été générée (scripts/analyse_changes.sh manquant ou non exécutable)." > analysis.txt
        fi
        echo "text<<EOF" >> $GITHUB_OUTPUT
        cat analysis.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Carte téléosémantique (Niveau 3)
      id: teleo
      run: |
        if [ -x scripts/teleosemantic_map.sh ]; then
          bash scripts/teleosemantic_map.sh > teleo.txt
        else
          echo "La théorie se trouve dans un état téléosémantique stable : la structure évolue progressivement, en cohérence avec les versions précédentes." > teleo.txt
        fi
        echo "text<<EOF" >> $GITHUB_OUTPUT
        cat teleo.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Extraire le message du commit
      id: commit_msg
      run: |
        msg=$(git log -1 --pretty=%B | tr '\n' ' ' | sed 's/"/“/g')
        echo "message=$msg" >> $GITHUB_OUTPUT

    - name: Create or Update Release
      id: rel
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ steps.read_tag.outputs.tag }}
        name: "Release intelligente — Projet ACR"
        allowUpdates: true
        removeArtifacts: false
        replacesArtifacts: true
        artifacts: |
          *.pdf
          *.tex
          *.thy
          attestation_report.txt
        artifactErrorsFailBuild: true
        body: |
          # Release intelligente — Projet ACR

          ## 1. Post-mortem de la version précédente
          ${{ steps.postmortem.outputs.text }}

          ## 2. Nouveaux points apportés
          ${{ steps.analysis.outputs.text }}

          ## 3. Classification conceptuelle
          Cette release est analysée selon trois niveaux :

          - **Niveau 1 — Théorie documentaire (humaine)**  
            Concerne les documents LaTeX, PDF, la narration, la philosophie, la structure explicative.

          - **Niveau 2 — Théorie formelle (mathématique)**  
            Concerne les fichiers Isabelle/HOL (.thy), les définitions, lemmes, théorèmes, invariances et preuves.

          - **Niveau 3 — Carte téléosémantique**  
            Concerne l'état d'esprit global de la théorie, sa direction, sa dynamique interne.

          ## 4. Carte téléosémantique — Niveau 3
          ${{ steps.teleo.outputs.text }}

          ## 5. Compilation et certification

          ### Compilation LaTeX
          - Tous les fichiers .tex présents dans le dépôt ont été compilés avec pdflatex (minted + sml + TOC).
          - Les PDF générés sont inclus comme artefacts de cette release.

          ### Certification Isabelle/HOL
          - Les scripts Isabelle/HOL (.thy) ont été compilés via \`isabelle build\`.
          - La certification HOL garantit la cohérence logique des structures formalisées.

          ### Attestation cryptographique
          - Un rapport SHA-256 (\`attestation_report.txt\`) a été généré pour tous les PDF.
          - Une attestation SLSA a été produite pour les artefacts de build.

          ## 6. Artefacts inclus dans la release
          - Tous les fichiers PDF générés
          - Tous les fichiers LaTeX (.tex)
          - Tous les fichiers Isabelle/HOL (.thy)
          - Le fichier \`attestation_report.txt\`
          - Les attestations SLSA associées

          ## 7. Structure du dépôt
          ```
          ${{ steps.structure.outputs.tree }}
          ```

          ## 8. Message du commit
          ${{ steps.commit_msg.outputs.message }}

          ## 9. Contexte permanent
          Ce projet vise à formaliser l’unification mathématique « L’univers est au carré », en articulant :
          - une théorie documentaire (niveau 1),
          - une théorie formelle (niveau 2),
          - et une dynamique téléosémantique (niveau 3) qui décrit l’état d’esprit de la théorie à chaque release.

    - name: Release summary
      run: |
        echo "## Release mise à jour" >> $GITHUB_STEP_SUMMARY
        echo "- Tag : ${{ steps.read_tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
        echo "- Lien : ${{ steps.rel.outputs.html_url }}" >> $GITHUB_STEP_SUMMARY
