name: Build Isabelle + LaTeX + Release automatique

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      new: ${{ steps.version.outputs.new }}
      message: ${{ steps.commit.outputs.message }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install minimal TeX Live + pygments
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          texlive-latex-base \
          texlive-latex-recommended \
          texlive-latex-extra \
          texlive-fonts-recommended \
          python3-pygments

    - name: Install Isabelle 2024
      run: |
        wget https://isabelle.in.tum.de/website-Isabelle2024/dist/Isabelle2024_linux.tar.gz
        tar -xzf Isabelle2024_linux.tar.gz
        mv Isabelle2024 isabelle
        echo "$PWD/isabelle/bin" >> $GITHUB_PATH

    - name: Isabelle build (certification HOL)
      run: |
        if [ -f ROOT ]; then
          isabelle build -D .
        else
          shopt -s nullglob
          for thy in *.thy; do
            isabelle build -b -d . "$thy" || true
          done
        fi

    - name: Compile LaTeX (minted + sml + TOC)
      run: |
        shopt -s nullglob
        for file in *.tex; do
          pdflatex -shell-escape -interaction=nonstopmode "$file" || true
          pdflatex -shell-escape -interaction=nonstopmode "$file" || true
          pdflatex -shell-escape -interaction=nonstopmode "$file" || true
        done

    - name: Upload PDFs
      uses: actions/upload-artifact@v4
      with:
        name: pdfs
        path: "*.pdf"

    - name: Generate build provenance
      uses: actions/attest-build-provenance@v1
      with:
        subject-path: "*.pdf"

    - name: Extract commit message
      id: commit
      run: |
        msg=$(git log -1 --pretty=%B)
        echo "message=$msg" >> $GITHUB_OUTPUT

    - name: Determine version bump
      id: bump
      run: |
        msg="${{ steps.commit.outputs.message }}"
        if [[ "$msg" == major:* ]]; then
          echo "level=major" >> $GITHUB_OUTPUT
        elif [[ "$msg" == feat:* ]]; then
          echo "level=minor" >> $GITHUB_OUTPUT
        elif [[ "$msg" == fix:* ]]; then
          echo "level=patch" >> $GITHUB_OUTPUT
        else
          echo "level=patch" >> $GITHUB_OUTPUT
        fi

    - name: Get latest tag (robust fallback)
      id: tag
      run: |
        latest=$(git describe --tags --abbrev=0 2>/dev/null || true)
        if [[ -z "$latest" ]]; then
          latest="v-acr-0.0.0"
        fi
        if [[ ! "$latest" =~ ^v-acr-[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          latest="v-acr-0.0.0"
        fi
        echo "latest=$latest" >> $GITHUB_OUTPUT

    - name: Compute next version
      id: version
      run: |
        level="${{ steps.bump.outputs.level }}"
        latest="${{ steps.tag.outputs.latest }}"
        base=${latest#v-acr-}
        IFS='.' read -r major minor patch <<< "$base"

        major=${major:-0}
        minor=${minor:-0}
        patch=${patch:-0}

        if [[ "$level" == "major" ]]; then
          major=$((major+1)); minor=0; patch=0
        elif [[ "$level" == "minor" ]]; then
          minor=$((minor+1)); patch=0
        else
          patch=$((patch+1))
        fi

        new="v-acr-$major.$minor.$patch"
        echo "new=$new" >> $GITHUB_OUTPUT

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download PDFs
      uses: actions/download-artifact@v4
      with:
        name: pdfs
        path: .

    - name: Generate filtered repository structure
      id: structure
      run: |
        echo "tree<<EOF" >> $GITHUB_OUTPUT
        find . -type f \( \
          -name "*.tex" -o \
          -name "*.thy" -o \
          -name "*.pdf" -o \
          -name "README*.md" -o \
          -name "CHANGELOG.md" -o \
          -name "SECURITY.md" -o \
          -name "algorithme_methodologie.md" -o \
          -name "guide_*.md" \
        \) | sed 's|^\./||' | sort | awk '
          BEGIN{FS="/"}
          {
            indent = ""
            for(i=1;i<NF;i++) indent = indent "  "
            print indent "├── " $NF
          }
        ' >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create or Update Release
      id: rel
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ needs.build.outputs.new }}
        name: "Release continue — Projet ACR"
        allowUpdates: true
        removeArtifacts: false
        artifacts: |
          *.pdf
          *.tex
          *.thy
        artifactErrorsFailBuild: true
        body: |
          # 📘 Dossier de Release — Projet ACR

          ## 🧭 Résumé du dépôt

          Le dépôt **analyse_conjecture_riemann_savard** est un projet scientifique et mathématique personnel développé par son auteur, **Philippe Thomas Savard**. Bien que l’auteur ne soit pas affilié au milieu académique, le dépôt se distingue par une rigueur méthodologique constante et une volonté affirmée d’atteindre l’excellence dans l’analyse et la formalisation mathématique.

          L’un des chapitres centraux du dépôt porte sur l’étude de l’énigme de Bernhard Riemann et de sa célèbre conjecture concernant la fonction zêta. Ce sujet ambitieux est abordé à travers des documents explicatifs détaillant les méthodes originales employées par l’auteur pour explorer et tenter de résoudre cette problématique historique.

          Deux validations formelles, entièrement codées en Isabelle/HOL, sont disponibles dans le dépôt. Elles peuvent être consultées, modifiées, partagées ou enrichies conformément aux permissions définies dans la licence du projet. Plusieurs documents PDF accompagnent ces validations formelles et sont générés automatiquement par le workflow GitHub Actions, incluant leurs attestations cryptographiques. Le rapport de certification produit lors de chaque exécution du workflow est également fourni et accessible aux utilisateurs et contributeurs.

          Le dépôt comprend également d’autres chapitres qui s’inscrivent dans une perspective plus large d’unification mathématique, en lien avec la théorie personnelle de l’auteur intitulée **« L’univers est au carré »**. Les différents volets de cette théorie sont présentés et documentés dans les sections correspondantes du dépôt.

          Un fichier **README.md**, situé à la racine du dépôt, présente les informations essentielles concernant l’utilisation du projet, ses règles, son fonctionnement et ses objectifs. L’auteur invite les utilisateurs à le consulter pour toute question relative au dépôt.

          Pour accompagner les validations formelles, plusieurs fichiers de référence sont fournis. Ils expliquent la méthodologie employée, les procédures de reproduction des résultats et les principes théoriques sous-jacents. Un fichier supplémentaire sert de guide méthodologique complet pour les résultats avancés présentés dans les scripts Isabelle/HOL.

          Les mises à jour successives du dépôt sont consignées dans le fichier **CHANGELOG.md**, mis à jour automatiquement à chaque contribution.

          Le dépôt inclut également le code source d’une application web développée par l’auteur. Cette application intègre trois intelligences artificielles — collaborative, socratique et évolutive — dédiées exclusivement à la théorie « L’univers est au carré ». Ces IA s’appuient sur une banque évolutive de 23 questions-réponses, enrichie progressivement par les interactions des utilisateurs. Elles disposent également de 55 documents de référence, incluant les validations formelles Isabelle/HOL, afin de répondre de manière pertinente aux questions portant sur la théorie.

          ## 👤 Informations sur l’auteur et le dépôt

          - **Nom de l’auteur** : Philippe Thomas Savard  
          - **Titre du dépôt** : *Analyse de la conjecture de Bernhard Riemann — L’univers est au carré*  
          - **Adresse courriel** : *PhilippethomasSavard@gmail.com*  
          - **Licence** : Apache 2.0  
          - **Lieu** : Lévis, Chaudière‑Appalaches, Canada  
          - **Date de rédaction** : 27 mars 2026  

          L’auteur invite chaleureusement les lecteurs à consulter les documents PDF portant sur la philosophie qui sous‑tend la théorie unifiée **« L’univers est au carré »**, notamment :

          - *Téléosémantique de l’esprit d’un analogiste* — version originale en français  
          - *Teleosemantics of the Analogist Mind* — version adaptée en anglais  

          ## 📁 Structure du dépôt (mise à jour automatiquement)

          ```
          ${{ steps.structure.outputs.tree }}
          ```

          ## 📚 Bibliographie et références formelles

          - **Mathlib (Lean Mathematical Library)**  
            Dépôt GitHub : https://github.com/leanprover-community/mathlib3.git  
            Projet collaboratif de formalisation mathématique en Lean, utilisé comme référence pour l’étude formelle de la fonction zêta de Riemann et d’autres théorèmes avancés.

          ---

          ## 🔢 Version générée
          ${{ needs.build.outputs.new }}

          ## 📅 Date de génération
          ${{ github.event.head_commit.timestamp }}

          ## 📝 Message du commit
          ${{ needs.build.outputs.message }}

          ## 📄 Documents générés et inclus dans la release
          - Tous les fichiers **PDF**
          - Tous les fichiers **LaTeX (.tex)**
          - Tous les fichiers **Isabelle/HOL (.thy)**

          ## 🔐 Attestation cryptographique
          Chaque PDF est accompagné d’une attestation SLSA générée automatiquement.

          ## 🧠 Contexte permanent
          Ce projet vise à formaliser l’unification mathématique « L’univers est au carré ».

          ## 🧩 Notes permanentes
          - Cette release est mise à jour automatiquement à chaque commit manuel.
          - Aucun commit automatique n’est effectué dans le dépôt.
          - La structure de cette release est stable et ne change pas.
          - Les fichiers PDF, TEX et THY sont remplacés proprement à chaque génération.

    - name: Release summary
      run: |
        echo "## 🚀 Release mise à jour" >> $GITHUB_STEP_SUMMARY
        echo "- Release : ${{ needs.build.outputs.new }}" >> $GITHUB_STEP_SUMMARY
        echo "- Version générée : ${{ needs.build.outputs.new }}" >> $GITHUB_STEP_SUMMARY
        echo "- Lien : ${{ steps.rel.outputs.html_url }}" >> $GITHUB_STEP_SUMMARY
