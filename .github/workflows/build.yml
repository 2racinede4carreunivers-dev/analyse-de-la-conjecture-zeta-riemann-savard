name: Build Isabelle + LaTeX (version active)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-attest:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # --- INSTALLATION TEXLIVE MINIMAL + PYGMENTS ---
    - name: Install minimal TeX Live + pygments
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          texlive-latex-base \
          texlive-latex-recommended \
          texlive-latex-extra \
          texlive-fonts-recommended \
          python3-pygments

    # --- INSTALLATION ISABELLE 2024 ---
    - name: Install Isabelle 2024
      run: |
        wget https://isabelle.in.tum.de/website-Isabelle2024/dist/Isabelle2024_linux.tar.gz
        tar -xzf Isabelle2024_linux.tar.gz
        mv Isabelle2024 isabelle
        echo "$PWD/isabelle/bin" >> $GITHUB_PATH

    # --- COMPILATION ISABELLE ---
    - name: Isabelle build (certification HOL)
      run: |
        # Ajout du nouveau fichier espace_philippot.thy dans la session via ROOT
        if [ -f ROOT ]; then
          echo "ROOT détecté — compilation complète"
          isabelle build -D .
        else
          echo "Pas de ROOT — certification des .thy individuels"
          shopt -s nullglob
          for thy in *.thy; do
            echo "Certification de $thy"
            isabelle build -b -d . "$thy" || true
          done
        fi

    # --- COMPILATION LATEX ---
    - name: Compile LaTeX (minted + sml + TOC)
      run: |
        shopt -s nullglob
        for file in *.tex; do
          echo "Compilation de $file"
          pdflatex -shell-escape -interaction=nonstopmode "$file" || true
          pdflatex -shell-escape -interaction=nonstopmode "$file" || true
          pdflatex -shell-escape -interaction=nonstopmode "$file" || true
        done

    # --- ARTEFACTS ---
    - name: Upload PDFs
      uses: actions/upload-artifact@v4
      with:
        name: pdfs
        path: "*.pdf"
